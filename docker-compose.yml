services:
  user-service:
    build: ./user-service
    container_name: erp-user-service
    environment:
      PORT: 3002
    expose:
      - "3002"
    networks:
      - erp-net
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    container_name: erp-auth-service
    environment:
      PORT: 3001
      # Inter-service URL uses the compose service name as hostname
      USER_SERVICE_URL: http://user-service:3002
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600s}
    expose:
      - "3001"
    depends_on:
      - user-service
    networks:
      - erp-net
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: erp-api-gateway
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
    # Only the gateway is published to the host
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
    networks:
      - erp-net
    restart: unless-stopped

networks:
  erp-net:
    driver: bridge
